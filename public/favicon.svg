<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Rounded square background (resembling a iOS/Android app icon) -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  
  <defs>
    <linearGradient id="fitnessGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Modern dumbbell/lightning bolt logo -->
  <g transform="translate(106, 106) scale(0.585)">
    <!-- Dumbbell Left Weight -->
    <rect x="40" y="160" width="60" height="180" rx="25" fill="url(#fitnessGrad)" />
    <!-- Dumbbell Right Weight -->
    <rect x="400" y="160" width="60" height="180" rx="25" fill="url(#fitnessGrad)" />
    <!-- Dumbbell Shaft -->
    <rect x="80" y="230" width="340" height="40" rx="12" fill="url(#fitnessGrad)" />
    
    <!-- Stylized dynamic lightning bolt overlay -->
    <polygon points="290,60 150,280 250,280 222,440 362,220 262,220" fill="#f59e0b" stroke="#0f172a" stroke-width="24" stroke-linejoin="round" />
  </g>
</svg>
